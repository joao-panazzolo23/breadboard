<form class="order-items">
  <header>
    <h3> Selecione os produtos </h3>
  </header>

  <table class="table--items">
    <thead>
    <tr>
      <th style="width:40%">Produto</th>
      <th style="width:20%">Qtd</th>
      <th style="width:20%">Preço Unit.</th>
      <th style="width:15%; text-align:right; padding-right:1rem">Total</th>
      <th style="width:5%"></th>
    </tr>
    </thead>

    <tbody>
    <select formControlName="id" (change)="onProductSelect($index)">
      <option value="" disabled>Selecione...</option>
      @for (product of products(); track product.id) {
        <option [value]="product.id">{{ product.name }}</option>
      }
    </select>
    <td>
      <input type="number" min="1" (change)="calculateTotal()">
    </td>
    <td>
      <input type="text" placeholder="Valor do produto" (change)="calculateTotal()">
    </td>
    <td>
      <input type="text" placeholder="Nome do produto" (change)="calculateTotal()">
    </td>
    </tbody>


  </table>


</form>
