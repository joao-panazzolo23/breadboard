<div class="kanban-board">
  <div class="kanban-board__header">
    <div class="add-orders">
      <!--todo: redirect this to order details AND ALSO make an option to see -->
      <button class="btn btn--accept" (click)="goToDetails(null)">Fazer um novo pedido</button>
    </div>

    <h1 class="kanban-board__title">
      Pedidos
    </h1>

    <div></div>
  </div>

  <div class="kanban-board__columns">
    @for (column of columns; track column.id) {
      <app-kanban-column
        [column]="column"
        [connectedTo]="getConnectedLists()"
        (cardDropped)="drop($event)">
      </app-kanban-column>
    }
  </div>
</div>
